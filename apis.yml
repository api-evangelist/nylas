aid: nylas
name: Nylas
description: >-
  Nylas connects your application to every email inbox and calendar in the world.
  The Nylas v3 platform provides REST APIs for email, calendar, contacts, scheduling,
  authentication, and administration with official SDKs for Node.js, Python, Ruby,
  and Kotlin/Java.
